<svg viewBox="0 0 1440 390" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background:#090d16; font-family:'JetBrains Mono', monospace;">
  <style>
    /* Wave Path Animations using CSS Morphing */
    .wave-path-0 {
      animation: waveMorph-0 5s linear infinite;
    }
    .wave-path-1 {
      animation: waveMorph-1 5s linear infinite;
    }

    @keyframes waveMorph-0 {
      0% { d: path("M 0,400 L 0,100 C 270,83.75 540,67.5 780,80 C 1020,92.5 1230,133.75 1440,175 L 1440,400 L 0,400 Z"); }
      25% { d: path("M 0,400 L 0,100 C 283,94.25 566,88.5 806,101 C 1046,113.5 1243,144.25 1440,175 L 1440,400 L 0,400 Z"); }
      50% { d: path("M 0,400 L 0,100 C 226,87.75 452,75.5 692,88 C 932,100.5 1186,137.75 1440,175 L 1440,400 L 0,400 Z"); }
      75% { d: path("M 0,400 L 0,100 C 243,100.25 486,100.5 726,113 C 966,125.5 1203,150.25 1440,175 L 1440,400 L 0,400 Z"); }
      100% { d: path("M 0,400 L 0,100 C 270,83.75 540,67.5 780,80 C 1020,92.5 1230,133.75 1440,175 L 1440,400 L 0,400 Z"); }
    }

    @keyframes waveMorph-1 {
      0% { d: path("M 0,400 L 0,233 C 281,238.25 562,243.5 802,256 C 1042,268.5 1241,288.25 1440,308 L 1440,400 L 0,400 Z"); }
      25% { d: path("M 0,400 L 0,233 C 221.5,247.25 443,261.5 683,274 C 923,286.5 1181.5,297.25 1440,308 L 1440,400 L 0,400 Z"); }
      50% { d: path("M 0,400 L 0,233 C 241,233.75 482,234.5 722,247 C 962,259.5 1201,283.75 1440,308 L 1440,400 L 0,400 Z"); }
      75% { d: path("M 0,400 L 0,233 C 220.5,237.25 441,241.5 681,254 C 921,266.5 1180.5,287.25 1440,308 L 1440,400 L 0,400 Z"); }
      100% { d: path("M 0,400 L 0,233 C 281,238.25 562,243.5 802,256 C 1042,268.5 1241,288.25 1440,308 L 1440,400 L 0,400 Z"); }
    }

    /* Radar Rotations */
    .radar-clockwise {
      transform-origin: 160px 160px;
      animation: rotateCW 25s linear infinite;
    }
    .radar-counter {
      transform-origin: 160px 160px;
      animation: rotateCCW 18s linear infinite;
    }
    .radar-sweep {
      transform-origin: 160px 160px;
      animation: rotateCW 8s linear infinite;
    }

    @keyframes rotateCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotateCCW {
      from { transform: rotate(360deg); }
      to { transform: rotate(-360deg); }
    }

    /* Breathing and Pulsing elements */
    .pulse-glow {
      animation: pulse 2s ease-in-out infinite;
    }
    .breath-vent {
      animation: breathe 3s ease-in-out infinite;
    }
    .scanline {
      animation: scan 4s ease-in-out infinite;
    }
    .terminal-type {
      animation: typeText 10s steps(40) infinite;
    }
    .terminal-cursor {
      animation: typeText 10s steps(40) infinite, blink 0.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes breathe {
      0%, 100% { stroke-opacity: 0.4; }
      50% { stroke-opacity: 1; }
    }
    @keyframes scan {
      0%, 100% { y1: 50px; y2: 50px; opacity: 0.8; }
      50% { y1: 270px; y2: 270px; opacity: 0.3; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <defs>
    <!-- Glowing Green Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Metallic Face Gradient -->
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Hood Gradient (Doom Green) -->
    <linearGradient id="hood-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>

    <!-- Wave Gradients -->
    <linearGradient id="wave-grad-0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="50%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.08" />
      <circle cx="40" cy="40" r="1" fill="#10b981" fill-opacity="0.2" />
    </pattern>
  </defs>

  <!-- ================= ANIMATED WAVE BACKGROUND ================= -->
  <!-- Wave 0 (Background Wave) -->
  <path d="M 0,400 L 0,100 C 270,83.75 540,67.5 780,80 C 1020,92.5 1230,133.75 1440,175 L 1440,400 L 0,400 Z" 
        fill="url(#wave-grad-0)" fill-opacity="0.22" class="wave-path-0" transform="rotate(-180 720 200)"></path>

  <!-- Wave 1 (Foreground Wave - Blends to Page Background) -->
  <path d="M 0,400 L 0,233 C 281,238.25 562,243.5 802,256 C 1042,268.5 1241,288.25 1440,308 L 1440,400 L 0,400 Z" 
        fill="url(#wave-grad-1)" fill-opacity="0.95" class="wave-path-1" transform="rotate(-180 720 200)"></path>

  <!-- Background Grid overlaying the filled top part of the waves -->
  <rect width="1440" height="260" fill="url(#grid)" opacity="0.4" />

  <!-- Diagonal Tech Accents -->
  <path d="M 0 240 L 300 240 L 340 280 L 0 280 Z" fill="#10b981" fill-opacity="0.04" />
  <path d="M 1440 40 L 1140 40 L 1100 0 L 1440 0 Z" fill="#10b981" fill-opacity="0.04" />
  <line x1="0" y1="240" x2="300" y2="240" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.25" />
  <line x1="1440" y1="40" x2="1140" y2="40" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.25" />

  <!-- ================= DOOM MASK ART AND HUD ================= -->
  <g transform="translate(80, 20)">
    <!-- Target Sight HUD -->
    <circle cx="160" cy="160" r="140" fill="none" stroke="#10b981" stroke-width="0.75" stroke-opacity="0.08" stroke-dasharray="10 5" />
    <circle cx="160" cy="160" r="130" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="5 15" class="radar-clockwise" />
    <circle cx="160" cy="160" r="120" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="12 8" class="radar-counter" />
    
    <!-- Radar Sweep Line -->
    <line x1="160" y1="160" x2="160" y2="25" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" filter="url(#glow)" class="radar-sweep" />
    <path d="M 160 10 L 160 35 M 160 285 L 160 310 M 10 160 L 35 160 M 285 160 L 310 160" stroke="#10b981" stroke-width="1.25" stroke-opacity="0.2" />

    <!-- Hood Shadow -->
    <path d="M 80 40 Q 150 20 220 40 L 250 150 Q 250 250 150 290 Q 50 250 50 150 Z" fill="#021f17" opacity="0.6" />
    <!-- Hood Outline -->
    <path d="M 75 45 Q 150 15 225 45 Q 260 140 245 230 Q 220 285 150 295 Q 80 285 55 230 Q 40 140 75 45 Z" fill="url(#hood-grad)" stroke="#047857" stroke-width="3" />
    <!-- Inner Face Shadow -->
    <path d="M 90 80 Q 150 70 210 80 Q 230 150 225 210 Q 200 260 150 270 Q 100 260 75 210 Q 70 150 90 80 Z" fill="#020617" />
    <!-- Metal Mask Faceplate -->
    <path d="M 95 90 Q 150 80 205 90 Q 215 130 215 180 Q 210 240 150 255 Q 90 240 85 180 Q 85 130 95 90 Z" fill="url(#metal-grad)" stroke="#475569" stroke-width="2" />

    <!-- Forehead Seam and Rivets -->
    <line x1="150" y1="80" x2="150" y2="125" stroke="#1e293b" stroke-width="2.5" />
    <circle cx="150" cy="92" r="2.5" fill="#94a3b8" />
    <circle cx="150" cy="115" r="2.5" fill="#94a3b8" />

    <!-- Brow Arc -->
    <path d="M 100 120 Q 150 100 200 120" fill="none" stroke="#1e293b" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 105 125 Q 150 108 195 125" fill="none" stroke="#64748b" stroke-width="1.5" />

    <!-- Visor Slits / Glowing Eyes -->
    <path d="M 107 136 L 138 139 L 135 147 L 112 144 Z" fill="#022c22" stroke="#065f46" stroke-width="1.5" />
    <path d="M 112 139 L 134 141 L 132 144 L 115 142 Z" fill="#00ffcc" filter="url(#glow)" class="pulse-glow" />
    
    <path d="M 193 136 L 162 139 L 165 147 L 188 144 Z" fill="#022c22" stroke="#065f46" stroke-width="1.5" />
    <path d="M 188 139 L 166 141 L 168 144 L 185 142 Z" fill="#00ffcc" filter="url(#glow)" class="pulse-glow" />

    <!-- Nose Guard/Plate -->
    <path d="M 140 142 L 160 142 L 165 175 L 150 190 L 135 175 Z" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <line x1="150" y1="142" x2="150" y2="185" stroke="#0f172a" stroke-width="1.5" />

    <!-- Mouth Vent / Grille with Breathing Glow -->
    <rect x="125" y="198" width="50" height="22" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1.5" />
    <line x1="133" y1="202" x2="133" y2="216" stroke="#10b981" stroke-width="2" stroke-linecap="round" filter="url(#glow)" class="breath-vent" />
    <line x1="141" y1="202" x2="141" y2="216" stroke="#10b981" stroke-width="2" stroke-linecap="round" filter="url(#glow)" class="breath-vent" />
    <line x1="150" y1="202" x2="150" y2="216" stroke="#10b981" stroke-width="2" stroke-linecap="round" filter="url(#glow)" class="breath-vent" />
    <line x1="159" y1="202" x2="159" y2="216" stroke="#10b981" stroke-width="2" stroke-linecap="round" filter="url(#glow)" class="breath-vent" />
    <line x1="167" y1="202" x2="167" y2="216" stroke="#10b981" stroke-width="2" stroke-linecap="round" filter="url(#glow)" class="breath-vent" />

    <!-- Cheek Rivets -->
    <circle cx="102" cy="180" r="2.5" fill="#94a3b8" />
    <circle cx="198" cy="180" r="2.5" fill="#94a3b8" />
    <circle cx="112" cy="215" r="2.5" fill="#94a3b8" />
    <circle cx="188" cy="215" r="2.5" fill="#94a3b8" />

    <!-- Laser Scanline -->
    <line x1="45" y1="160" x2="275" y2="160" stroke="#00ffcc" stroke-width="1.5" opacity="0.75" filter="url(#glow)" class="scanline" />
  </g>

  <!-- ================= CONSOLE HUD / TEXT DETAILS ================= -->
  <g transform="translate(480, 50)">
    <!-- Tech Corner Accents -->
    <path d="M -10 25 L -10 -5 L 30 -5" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.6" />
    
    <!-- Blinking Node Box -->
    <rect x="0" y="5" width="12" height="12" fill="#10b981" filter="url(#glow)" class="pulse-glow" />
    <text x="24" y="16" fill="#10b981" font-size="14" font-weight="bold" letter-spacing="2" filter="url(#glow)">SECURE NODE: ONLINE</text>
    
    <!-- Title and Subtitle -->
    <text x="0" y="52" fill="#ffffff" font-size="30" font-weight="900" letter-spacing="1">SHIZUPHRENIA</text>
    <text x="0" y="78" fill="#10b981" font-size="14" font-weight="bold" letter-spacing="3" opacity="0.8">LATVERIAN CYBER-FORTRESS</text>

    <!-- Divider Line -->
    <line x1="0" y1="92" x2="720" y2="92" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    <rect x="0" y="91" width="80" height="3" fill="#10b981" filter="url(#glow)" />

    <!-- System Metrics Row -->
    <text x="0" y="120" fill="#64748b" font-size="12">HOST: <tspan fill="#94a3b8">DOOM-MAINFRAME-V3</tspan></text>
    <text x="280" y="120" fill="#64748b" font-size="12">OS: <tspan fill="#94a3b8">KALI-HARDENED-SYS</tspan></text>
    <text x="560" y="120" fill="#64748b" font-size="12">NET: <tspan fill="#10b981">DMZ ACTIVE</tspan></text>

    <!-- Scanner Row -->
    <text x="0" y="145" fill="#64748b" font-size="12">THREAT SCANNER: <tspan fill="#10b981" font-weight="bold">WAZUH.AGENT.RUNNING</tspan></text>
    <text x="420" y="145" fill="#64748b" font-size="12">FIREWALL: <tspan fill="#10b981">SURICATA_ENGAGED</tspan></text>

    <!-- Animated Terminal Command Line Mockup -->
    <g transform="translate(0, 165)">
      <rect x="0" y="0" width="720" height="42" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1" />
      <text x="15" y="25" fill="#38bdf8" font-size="12">shizuphrenia@latveria<tspan fill="#ffffff">:</tspan><tspan fill="#a855f7">~</tspan><tspan fill="#ffffff">$</tspan></text>
      
      <!-- Command text -->
      <text x="175" y="25" fill="#10b981" font-size="12">sudo threat-detect --mode=active-block</text>
      
      <!-- Cover overlay that animates left/right to simulate typing -->
      <rect x="175" y="8" width="480" height="24" fill="#020617">
        <animate attributeName="x" values="175;620;175" dur="10s" repeatCount="indefinite" keyTimes="0;0.5;1" />
        <animate attributeName="width" values="480;0;480" dur="10s" repeatCount="indefinite" keyTimes="0;0.5;1" />
      </rect>

      <!-- Blinking Terminal Cursor -->
      <rect x="175" y="12" width="7" height="15" fill="#10b981" filter="url(#glow)">
        <animate attributeName="x" values="175;620;175" dur="10s" repeatCount="indefinite" keyTimes="0;0.5;1" />
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
      </rect>

      <!-- Right glowing action indicator -->
      <circle cx="700" cy="21" r="4.5" fill="#10b981" filter="url(#glow)" class="pulse-glow" />
    </g>

    <!-- Bottom Decree Footer -->
    <text x="0" y="235" fill="#475569" font-style="italic" font-size="11">"None shall rival the cybersecurity matrix of Doom."</text>
  </g>

  <!-- Frame border brackets -->
  <path d="M 12 12 L 12 40 M 12 12 L 40 12" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.4" />
  <path d="M 1428 12 L 1428 40 M 1428 12 L 1400 12" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.4" />
  <path d="M 12 378 L 12 350 M 12 378 L 40 378" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.4" />
  <path d="M 1428 378 L 1428 350 M 1428 378 L 1400 378" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.4" />
</svg>
